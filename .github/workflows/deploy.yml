name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Debug output directory
        run: |
          echo "Contents of ./out directory:"
          ls -la ./out
          
      - name: Add .nojekyll file
        run: touch ./out/.nojekyll
        
      - name: Debug after nojekyll
        run: |
          echo "Verifying .nojekyll file:"
          ls -la ./out/.nojekyll

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory ./out \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify-indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Notify IndexNow
        continue-on-error: true
        run: |
          http_code=$(
            curl --silent --show-error \
              --output /tmp/indexnow-response.txt \
              --write-out "%{http_code}" \
              --request POST "https://api.indexnow.org/indexnow" \
              --header "Content-Type: application/json; charset=utf-8" \
              --data '{
                "host": "rabauer.dev",
                "key": "9c0a4dd5-acde-4b3c-a9e5-7f7506e15f62",
                "keyLocation": "https://rabauer.dev/9c0a4dd5-acde-4b3c-a9e5-7f7506e15f62.txt",
                "urlList": [
                  "https://rabauer.dev/",
                  "https://rabauer.dev/sitemap.xml",
                  "https://rabauer.dev/llms.txt",
                  "https://rabauer.dev/en/blog/",
                  "https://rabauer.dev/de/blog/"
                ]
              }'
          )
          cat /tmp/indexnow-response.txt
          if [ "$http_code" -ge 400 ]; then
            echo "IndexNow submission failed with HTTP $http_code"
            exit 1
          fi